<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>币安账户监控台</title>
  <style>
    :root {
      --panel: rgba(255, 255, 255, 0.9);
      --panel-soft: rgba(255, 255, 255, 0.74);
      --line: rgba(46, 32, 14, 0.12);
      --text: #241b12;
      --muted: #7c6d5d;
      --accent: #b66c2f;
      --good: #1f7a48;
      --warn: #b07a00;
      --bad: #b54636;
      --off: #667085;
      --shadow: 0 18px 45px rgba(48, 31, 12, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 210, 140, 0.5), transparent 28%),
        linear-gradient(180deg, #fbf7f1 0%, #f1e8dc 100%);
    }

    .shell {
      width: min(1240px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 18px 0 32px;
    }

    .hero, .toolbar, .card, .group, .account {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero {
      padding: 20px 28px;
      display: grid;
      gap: 8px;
    }

    .hero-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hero-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      flex-wrap: wrap;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(26px, 3.6vw, 40px);
      line-height: 1.08;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: clamp(15px, 1.4vw, 17px);
    }

    .hero-actions {
      display: inline-flex;
      align-items: flex-start;
      justify-content: flex-end;
      gap: 10px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .hero-controls {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .toolbar {
      margin-top: 12px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toolbar-main {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .toolbar-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .toolbar-stats {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .stat-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--panel-soft);
      border: 1px solid rgba(46, 32, 14, 0.08);
      font-size: 13px;
      line-height: 1;
      white-space: nowrap;
    }

    .stat-pill-label { color: var(--muted); }

    .stat-pill-value {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .badge {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(182, 108, 47, 0.12);
      color: var(--accent);
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
    }

    .badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      flex: 0 0 auto;
    }

    .status-ok { color: var(--good); background: rgba(31, 122, 72, 0.12); }
    .status-partial { color: var(--warn); background: rgba(176, 122, 0, 0.12); }
    .status-error { color: var(--bad); background: rgba(181, 70, 54, 0.12); }
    .status-disabled { color: var(--off); background: rgba(102, 112, 133, 0.12); }

    .switch {
      display: inline-flex;
      align-items: center;
      gap: 0;
      padding: 6px;
      border: 1px solid rgba(46, 32, 14, 0.08);
      border-radius: 999px;
      background: var(--panel-soft);
      white-space: nowrap;
    }

    .switch input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .switch-track {
      width: 46px;
      height: 26px;
      border-radius: 999px;
      background: rgba(124, 109, 93, 0.28);
      position: relative;
      transition: background 0.2s ease;
      flex: 0 0 auto;
    }

    .switch-track::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 10px rgba(36, 27, 18, 0.18);
      transition: transform 0.2s ease;
    }

    .switch input:checked + .switch-track {
      background: rgba(31, 122, 72, 0.48);
    }

    .switch input:checked + .switch-track::after {
      transform: translateX(20px);
    }

    .switch input:disabled + .switch-track {
      opacity: 0.55;
    }

    .refresh-button {
      border: 1px solid rgba(46, 32, 14, 0.08);
      border-radius: 999px;
      background: var(--panel-soft);
      color: var(--text);
      padding: 8px 14px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, opacity 0.2s ease;
      min-width: 88px;
      text-align: center;
    }

    .refresh-button:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.94);
    }

    .refresh-button:disabled {
      opacity: 0.6;
      cursor: default;
    }

    #downloadTemplateButton { order: 1; }
    #importButton { order: 2; }
    #fundingTransferButton { order: 3; }

    .summary {
      margin-top: 18px;
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .profit-summary {
      margin-top: 18px;
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .card { padding: 18px; }

    .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .value {
      font-size: clamp(18px, 2.6vw, 26px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      overflow-wrap: anywhere;
      word-break: break-word;
      font-variant-numeric: tabular-nums;
    }

    .value-positive { color: var(--good); }
    .value-negative { color: var(--bad); }
    .side-long { color: var(--good); }
    .side-short { color: var(--bad); }

    .groups {
      margin-top: 20px;
      display: grid;
      gap: 18px;
    }

    .group { overflow: hidden; }

    .group-head {
      padding: 18px 22px;
      background: rgba(255, 248, 239, 0.84);
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .group-head h2 { margin: 0; }

    .group-actions {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .group-toggle-button {
      border: 1px solid rgba(46, 32, 14, 0.08);
      border-radius: 999px;
      background: var(--panel-soft);
      color: var(--text);
      padding: 8px 14px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, opacity 0.2s ease;
      white-space: nowrap;
    }

    .group-toggle-button:hover {
      background: rgba(255, 255, 255, 0.94);
    }

    .group-badges {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .group-summary {
      padding: 18px 22px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .account-list {
      padding: 0 22px 22px;
      display: grid;
      gap: 14px;
    }

    .account-list.is-collapsed {
      display: none;
    }

    .account-switcher {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .account-switch-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(46, 32, 14, 0.1);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(240, 232, 223, 0.94));
      color: var(--text);
      padding: 16px 22px;
      font: inherit;
      font-size: clamp(16px, 1.6vw, 22px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      min-width: 148px;
      text-align: center;
      text-decoration: none;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.7),
        0 10px 20px rgba(48, 31, 12, 0.06);
    }

    .account-switch-button:hover {
      border-color: rgba(182, 108, 47, 0.2);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(247, 238, 228, 0.96));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.72),
        0 14px 26px rgba(48, 31, 12, 0.1);
    }

    .account-switch-button:focus-visible {
      outline: none;
      border-color: rgba(182, 108, 47, 0.45);
      box-shadow:
        0 0 0 3px rgba(182, 108, 47, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.72),
        0 14px 26px rgba(48, 31, 12, 0.1);
    }

    .account-switch-button.is-active {
      border-color: rgba(46, 126, 63, 0.28);
      background: linear-gradient(180deg, #75d24d 0%, #57b933 100%);
      color: #10200e;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.28),
        0 14px 28px rgba(67, 139, 43, 0.22);
    }

    .account-single-view {
      display: block;
    }

    .account { overflow: hidden; }

    .account-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .account-head h3 { margin: 0; }

    .account-grid {
      padding: 16px 18px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
    }

    .metric {
      border: 1px solid rgba(46, 32, 14, 0.08);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.7);
      min-width: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      table-layout: fixed;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(46, 32, 14, 0.06);
      text-align: left;
      overflow-wrap: anywhere;
      word-break: break-word;
      font-variant-numeric: tabular-nums;
    }

    th { color: var(--muted); }

    .section { padding: 0 18px 18px; }

    .section h4 {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .empty { color: var(--muted); padding: 10px 0; }

    .modal-shell {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 50;
    }

    .modal-shell.hidden {
      display: none;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(36, 27, 18, 0.36);
      backdrop-filter: blur(6px);
    }

    .modal-panel {
      position: relative;
      width: min(1080px, calc(100vw - 32px));
      max-height: min(840px, calc(100vh - 32px));
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(255, 250, 244, 0.96);
      box-shadow: 0 24px 60px rgba(36, 27, 18, 0.22);
    }

    .modal-head,
    .modal-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 24px;
      border-bottom: 1px solid rgba(46, 32, 14, 0.08);
    }

    .modal-foot {
      border-bottom: 0;
      border-top: 1px solid rgba(46, 32, 14, 0.08);
      flex-wrap: wrap;
    }

    .modal-head h2 {
      margin: 0;
      font-size: 24px;
    }

    .modal-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .modal-close {
      border: 1px solid rgba(46, 32, 14, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
      color: var(--text);
      width: 40px;
      height: 40px;
      font: inherit;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
    }

    .modal-body {
      overflow: auto;
      padding: 20px 24px 24px;
      display: grid;
      gap: 16px;
    }

    .modal-controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .field select,
    .funding-amount-input {
      width: 100%;
      border: 1px solid rgba(46, 32, 14, 0.12);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }

    .segmented {
      display: inline-flex;
      width: 100%;
      padding: 4px;
      border-radius: 999px;
      background: rgba(46, 32, 14, 0.06);
      border: 1px solid rgba(46, 32, 14, 0.08);
      gap: 4px;
    }

    .segment-button {
      flex: 1 1 0;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      padding: 10px 14px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .segment-button.is-active {
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
      box-shadow: 0 10px 24px rgba(36, 27, 18, 0.08);
    }

    .modal-status,
    .modal-feedback {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .modal-status.is-error,
    .modal-feedback.is-error {
      color: var(--bad);
    }

    .modal-status.is-success,
    .modal-feedback.is-success {
      color: var(--good);
    }

    .funding-main-card {
      padding: 16px 18px;
      border: 1px solid rgba(46, 32, 14, 0.08);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.74);
      display: grid;
      gap: 10px;
    }

    .funding-main-card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .funding-main-card h3 {
      margin: 0;
      font-size: 18px;
    }

    .funding-main-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }

    .funding-stat {
      border: 1px solid rgba(46, 32, 14, 0.08);
      border-radius: 18px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.82);
    }

    .funding-list-wrap {
      border: 1px solid rgba(46, 32, 14, 0.08);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.78);
      overflow: hidden;
    }

    .funding-table {
      table-layout: auto;
    }

    .funding-table th,
    .funding-table td {
      vertical-align: middle;
      white-space: nowrap;
    }

    .funding-table td:last-child {
      white-space: normal;
    }

    .funding-table tbody tr.is-disabled {
      opacity: 0.58;
    }

    .funding-amount-input:disabled,
    .funding-table input[type="checkbox"]:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    .modal-actions {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      margin-left: auto;
    }

    .card-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .mono {
      font-family: Consolas, monospace;
      overflow-wrap: anywhere;
      word-break: break-word;
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 768px) {
      .shell { width: min(100vw - 20px, 1240px); }
      .hero { padding: 18px 18px; }
      .hero-title-row { align-items: flex-start; }
      .hero-actions {
        justify-content: flex-start;
        margin-left: 0;
      }
      .toolbar { padding: 12px 16px; }
      .account-switch-button {
        min-width: 0;
        flex: 1 1 calc(50% - 6px);
        padding: 14px 16px;
        font-size: 18px;
      }
      .modal-shell {
        padding: 12px;
      }
      .modal-panel {
        width: min(100vw - 12px, 1080px);
        max-height: min(100vh - 12px, 920px);
      }
      .modal-head,
      .modal-body,
      .modal-foot {
        padding-left: 16px;
        padding-right: 16px;
      }
      .funding-table th,
      .funding-table td {
        white-space: normal;
      }
      table { display: block; overflow-x: auto; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="hero-head">
        <div class="hero-title-row">
          <h1>币安账户监控台</h1>
          <div class="hero-actions">
            <div class="badge" id="connectionBadge">连接中</div>
            <div class="hero-controls">
              <label class="switch" for="monitorToggle">
                <input type="checkbox" id="monitorToggle" checked>
                <span class="switch-track" aria-hidden="true"></span>
              </label>
              <button class="refresh-button" id="fundingTransferButton" type="button">资金归集</button>
              <button class="refresh-button" id="downloadTemplateButton" type="button">下载模板</button>
              <button class="refresh-button" id="importButton" type="button">导入 Excel</button>
            </div>
          </div>
        </div>
      </div>
      <p>步步为营，稳中求胜</p>
    </section>

    <section class="toolbar">
      <div class="toolbar-main">
        <div id="messageText">正在等待监控数据</div>
        <div class="toolbar-stats" id="toolbarStats"></div>
      </div>
      <div class="toolbar-meta">
        <div class="mono" id="updatedAt">-</div>
        <button class="refresh-button" id="refreshButton" type="button">立即刷新</button>
        <input id="importInput" type="file" accept=".xlsx" hidden>
      </div>
    </section>

    <section class="summary" id="summaryCards"></section>
    <section class="profit-summary" id="profitCards"></section>
    <section class="groups" id="groupsContainer"></section>
  </main>

  <div class="modal-shell hidden" id="fundingModalShell">
    <div class="modal-backdrop" data-close-funding-modal="true"></div>
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="fundingModalTitle">
      <div class="modal-head">
        <div>
          <h2 id="fundingModalTitle">资金归集与分发</h2>
          <p class="modal-subtitle" id="fundingModalSubtitle">在主账号与子账号之间执行 Funding 资金划转</p>
        </div>
        <button class="modal-close" id="fundingModalClose" type="button" aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="modal-controls">
          <label class="field">
            <span>分组</span>
            <select id="fundingGroupSelect"></select>
          </label>
          <div class="field">
            <span>方向</span>
            <div class="segmented">
              <button class="segment-button is-active" id="fundingModeDistribute" type="button" data-funding-mode="distribute">主账号分发</button>
              <button class="segment-button" id="fundingModeCollect" type="button" data-funding-mode="collect">子账号归集</button>
            </div>
          </div>
          <label class="field">
            <span>代币</span>
            <select id="fundingAssetSelect"></select>
          </label>
        </div>
        <div class="modal-status" id="fundingCapabilityMessage"></div>
        <div class="funding-main-card" id="fundingMainSummary"></div>
        <div class="funding-list-wrap">
          <table class="funding-table">
            <thead>
              <tr>
                <th>选择</th>
                <th>子账号</th>
                <th>UID</th>
                <th>Funding 可用</th>
                <th>分发金额</th>
                <th>可用状态</th>
              </tr>
            </thead>
            <tbody id="fundingRows"></tbody>
          </table>
        </div>
      </div>
      <div class="modal-foot">
        <div class="modal-feedback" id="fundingFeedback"></div>
        <div class="modal-actions">
          <button class="refresh-button" id="fundingCancelButton" type="button">取消</button>
          <button class="refresh-button" id="fundingSubmitButton" type="button">提交</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    const summaryCards = document.getElementById('summaryCards');
    const profitCards = document.getElementById('profitCards');
    const groupsContainer = document.getElementById('groupsContainer');
    const connectionBadge = document.getElementById('connectionBadge');
    const messageText = document.getElementById('messageText');
    const updatedAt = document.getElementById('updatedAt');
    const toolbarStats = document.getElementById('toolbarStats');

    function fmt(value) {
      const number = Number(value || 0);
      return Number.isFinite(number)
        ? number.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
        : String(value ?? '-');
    }

    function fmtCount(value) {
      const number = Number(value || 0);
      return Number.isFinite(number) ? number.toLocaleString('zh-CN') : String(value ?? '0');
    }

    function fmtTime(value) {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString('zh-CN', { hour12: false });
    }

    function fmtPercent(value) {
      const number = Number(value || 0);
      return Number.isFinite(number)
        ? `${(number * 100).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}%`
        : '-';
    }

    function fmtOptionalPrice(value) {
      const number = Number(value || 0);
      if (!Number.isFinite(number) || number <= 0) {
        return '-';
      }
      return fmt(number);
    }

    function numberTone(value) {
      const number = Number(value);
      if (!Number.isFinite(number) || number === 0) {
        return '';
      }
      return number > 0 ? 'value-positive' : 'value-negative';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function textStatus(status) {
      const statusMap = {
        ok: '正常',
        partial: '部分异常',
        error: '异常',
        idle: '待连接',
        reconnecting: '重连中',
        disabled: '监控已关闭',
      };
      return statusMap[status] || status || '未知';
    }

    function textMessage(message) {
      const messageMap = {
        'Waiting for monitor connection': '正在等待监控连接',
        'No accounts available': '当前没有可用账户',
        'All accounts are healthy': '所有账户运行正常',
        'All accounts failed': '所有账户均拉取失败',
        'Some accounts failed': '部分账户拉取失败',
        'Monitoring disabled': '监控已关闭，已暂停自动刷新',
      };
      return messageMap[message] || message || '-';
    }

    function textAccountStatus(status) {
      const statusMap = {
        NORMAL: '正常',
      };
      return statusMap[status] || status || '-';
    }

    function textPositionSide(side) {
      const sideMap = {
        LONG: '多',
        SHORT: '空',
        BOTH: '双向',
      };
      return sideMap[side] || side || '-';
    }

    function positionSideTone(side) {
      if (side === 'LONG') return 'side-long';
      if (side === 'SHORT') return 'side-short';
      return '';
    }

    function statusClass(status) {
      if (status === 'ok') return 'status-ok';
      if (status === 'partial' || status === 'reconnecting') return 'status-partial';
      if (status === 'error') return 'status-error';
      if (status === 'disabled') return 'status-disabled';
      return '';
    }

    function refreshButtonLabel() {
      if (refreshCooldownSeconds > 0) {
        return `${refreshCooldownSeconds}秒`;
      }
      return '立即刷新';
    }

    function applyActionButtonState() {
      refreshButton.textContent = refreshButtonLabel();
      downloadTemplateButton.disabled = importBusy || refreshBusy || toggleBusy;
      refreshButton.disabled = importBusy || refreshBusy || refreshCooldownSeconds > 0;
      importButton.textContent = importBusy ? '导入中' : '导入 Excel';
      importButton.disabled = importBusy || refreshBusy || toggleBusy;
      fundingTransferButton.disabled = importBusy || refreshBusy || toggleBusy || currentGroups().length === 0;
      fundingSubmitButton.disabled = fundingModalBusy;
    }

    function startRefreshCooldown(seconds = 30) {
      if (refreshCooldownTimer !== null) {
        window.clearInterval(refreshCooldownTimer);
        refreshCooldownTimer = null;
      }
      refreshCooldownSeconds = Math.max(0, Number(seconds) || 0);
      applyActionButtonState();
      refreshCooldownTimer = window.setInterval(() => {
        refreshCooldownSeconds = Math.max(0, refreshCooldownSeconds - 1);
        if (refreshCooldownSeconds === 0 && refreshCooldownTimer !== null) {
          window.clearInterval(refreshCooldownTimer);
          refreshCooldownTimer = null;
        }
        applyActionButtonState();
      }, 1000);
    }

    function syncMonitorToggle(payload = {}) {

      monitorToggle.checked = enabled;
      monitorToggle.disabled = toggleBusy || refreshBusy || importBusy;
      applyActionButtonState();

      const cards = [
        { label: '\u6743\u76ca', value: fmt(summary.equity), tone: '' },

        { label: '\u53ef\u7528\u4f59\u989d', value: fmt(summary.available_balance), tone: '' },
        { label: '\u672a\u5b9e\u73b0\u76c8\u4e8f', value: fmt(summary.unrealized_pnl), tone: numberTone(summary.unrealized_pnl) },

    function renderRows(headers, rows, formatter) {
      if (!rows || rows.length === 0) {
        return '<div class="empty">暂无数据</div>';
      }
      return `
        <table>
          <thead><tr>${headers.map((header) => `<th>${header}</th>`).join('')}</tr></thead>
          <tbody>${rows.map((row) => formatter(row)).join('')}</tbody>
        </table>
      `;
    }

    function currentGroups() {

      return currentGroups().map((group) => ({
        id: String(group.main_account_id || ''),
        name: String(group.main_account_name || group.main_account_id || '-'),
      })).filter((group) => group.id);
    }

    function fundingRowState(accountId) {
      if (!fundingSelectionState[accountId]) {
        fundingSelectionState[accountId] = { checked: false, amount: '' };
      }
      return fundingSelectionState[accountId];
    }

    function resetFundingSelectionState() {
      fundingSelectionState = {};
      const children = Array.isArray(fundingOverview?.children) ? fundingOverview.children : [];
      children.forEach((child) => {
        fundingSelectionState[String(child.account_id || '')] = { checked: false, amount: '' };
      });
    }

    function setFundingMessage(target, message, tone = '') {
      target.textContent = message || '';
      target.className = tone ? `${target.id === 'fundingFeedback' ? 'modal-feedback' : 'modal-status'} ${tone}` : (target.id === 'fundingFeedback' ? 'modal-feedback' : 'modal-status');
    }

    function fundingAssetValue(row) {
      const asset = String(fundingSelectedAsset || '');
      if (!asset) {
        return '0';

      return row?.funding_available?.[asset] || '0';

            <div class="value">${fmt(available)}</div>

    function renderFundingRows() {

      fundingRows.innerHTML = rows.length
        ? rows.map((row) => {

    function renderFundingModal() {
      const groups = fundingGroupOptions();
      const selectedGroupId = fundingSelectedGroupId || groups[0]?.id || '';
      fundingSelectedGroupId = selectedGroupId;
      fundingGroupSelect.innerHTML = groups.map((group) => `
        <option value="${escapeHtml(group.id)}" ${group.id === selectedGroupId ? 'selected' : ''}>${escapeHtml(group.name)}</option>
      `).join('');

      const assets = Array.isArray(fundingOverview?.assets) ? fundingOverview.assets : [];
      if (!assets.includes(fundingSelectedAsset)) {
        fundingSelectedAsset = assets[0] || '';
      }
      fundingAssetSelect.innerHTML = assets.length
        ? assets.map((asset) => `<option value="${escapeHtml(asset)}" ${asset === fundingSelectedAsset ? 'selected' : ''}>${escapeHtml(asset)}</option>`).join('')
        : '<option value="">暂无可用代币</option>';

      fundingModeDistribute.classList.toggle('is-active', fundingDirection === 'distribute');
      fundingModeCollect.classList.toggle('is-active', fundingDirection === 'collect');
      setFundingMessage(
        fundingCapabilityMessage,
        fundingOverview?.available ? '当前分组可执行 Funding 分发与归集。' : (fundingOverview?.reason || '当前分组暂无可用归集能力'),
        fundingOverview?.available ? 'is-success' : 'is-error'
      );
      renderFundingMainSummary();
      renderFundingRows();
      fundingSubmitButton.textContent = fundingDirection === 'distribute' ? '执行分发' : '执行归集';
      fundingSubmitButton.disabled = fundingModalBusy || !fundingOverview?.available || !fundingSelectedAsset;
    }

    async function loadFundingOverview(mainAccountId, { resetState = false } = {}) {
      if (!mainAccountId) {
        fundingOverview = null;
        return;
      }
      fundingModalBusy = true;
      applyActionButtonState();
      setFundingMessage(fundingFeedback, '');
      try {
        const response = await fetch(`/api/funding/groups/${encodeURIComponent(mainAccountId)}`, { cache: 'no-store' });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.detail || `HTTP ${response.status}`);
        }
        fundingSelectedGroupId = mainAccountId;
        fundingOverview = payload;
        if (resetState) {
          resetFundingSelectionState();
        }
        renderFundingModal();
      } catch (error) {
        fundingOverview = {
          main_account_id: mainAccountId,
          main_account_name: mainAccountId,
          available: false,
          reason: String(error),
          assets: [],
          main_account: { uid: '', transfer_ready: false, reason: String(error), funding_assets: [], funding_available: {} },
          children: [],
        };
        resetFundingSelectionState();
        renderFundingModal();
      } finally {
        fundingModalBusy = false;
        applyActionButtonState();
        renderFundingModal();
      }
    }

    function openFundingModal() {
      const groups = fundingGroupOptions();
      fundingSelectedGroupId = fundingSelectedGroupId || groups[0]?.id || '';
      fundingSelectedAsset = '';
      fundingDirection = 'distribute';
      fundingModalShell.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
      loadFundingOverview(fundingSelectedGroupId, { resetState: true });
    }

    function closeFundingModal() {
      fundingModalShell.classList.add('hidden');
      document.body.style.overflow = '';
      fundingModalBusy = false;
      setFundingMessage(fundingFeedback, '');
    }

    async function refreshMonitorAfterFundingOperation() {
      try {
        const response = await fetch('/api/monitor/refresh', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        render(await response.json());
      } catch (error) {
        messageText.textContent = `资金操作后刷新监控失败：${error}`;
      }
    }

    async function submitFundingOperation() {
      if (fundingModalBusy || !fundingOverview || !fundingSelectedGroupId) {
        return;
      }

      const selectedRows = Object.entries(fundingSelectionState)
        .filter(([, state]) => Boolean(state.checked))
        .map(([accountId, state]) => ({ account_id: accountId, amount: state.amount || '' }));
      if (fundingDirection === 'distribute' && !selectedRows.some((row) => Number(row.amount) > 0)) {
        setFundingMessage(fundingFeedback, '请至少勾选一个子账号并填写大于 0 的分发金额。', 'is-error');
        return;
      }
      if (fundingDirection === 'collect' && selectedRows.length === 0) {
        setFundingMessage(fundingFeedback, '请至少勾选一个需要归集的子账号。', 'is-error');
        return;
      }

      fundingModalBusy = true;
      applyActionButtonState();
      setFundingMessage(fundingFeedback, fundingDirection === 'distribute' ? '正在执行 Funding 分发…' : '正在执行 Funding 归集…');
      try {
        const endpoint = fundingDirection === 'distribute'
          ? `/api/funding/groups/${encodeURIComponent(fundingSelectedGroupId)}/distribute`
          : `/api/funding/groups/${encodeURIComponent(fundingSelectedGroupId)}/collect`;
        const body = fundingDirection === 'distribute'
          ? { asset: fundingSelectedAsset, transfers: selectedRows }
          : { asset: fundingSelectedAsset, account_ids: selectedRows.map((row) => row.account_id) };
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.detail || `HTTP ${response.status}`);
        }
        fundingOverview = payload.overview || fundingOverview;
        resetFundingSelectionState();
        renderFundingModal();
        setFundingMessage(fundingFeedback, payload.message || '操作完成', payload.results?.every((row) => row.success) ? 'is-success' : 'is-error');
        await refreshMonitorAfterFundingOperation();
      } catch (error) {
        setFundingMessage(fundingFeedback, `资金操作失败：${error}`, 'is-error');
      } finally {
        fundingModalBusy = false;
        applyActionButtonState();
        renderFundingModal();
      }
    }

    function findGroupByMainId(mainAccountId) {
      return currentGroups().find((group) => String(group.main_account_id || '') === String(mainAccountId)) || null;
    }

    function findGroupNode(mainAccountId) {
      return Array.from(groupsContainer.querySelectorAll('.group')).find(
        (node) => String(node.dataset.mainAccountId || '') === String(mainAccountId)
      ) || null;
    }

    function normalizeGroupUiState(groups = currentGroups()) {
      const validMainIds = new Set();

      for (const group of groups) {
        const mainAccountId = String(group.main_account_id || '');
        if (!mainAccountId) {
          continue;
        }

        validMainIds.add(mainAccountId);
        if (!(mainAccountId in groupExpandedState)) {
          groupExpandedState[mainAccountId] = false;
        }

        const accounts = Array.isArray(group.accounts) ? group.accounts : [];
        const selectedAccountId = String(groupSelectedAccountState[mainAccountId] || '');
        if (!accounts.some((account) => String(account.account_id || '') === selectedAccountId)) {
          groupSelectedAccountState[mainAccountId] = accounts[0]?.account_id || '';
        }
      }

      for (const mainAccountId of Object.keys(groupExpandedState)) {
        if (!validMainIds.has(mainAccountId)) {
          delete groupExpandedState[mainAccountId];
        }
      }

      for (const mainAccountId of Object.keys(groupSelectedAccountState)) {
        if (!validMainIds.has(mainAccountId)) {
          delete groupSelectedAccountState[mainAccountId];
        }
      }
    }

    function isGroupExpanded(mainAccountId) {
      return groupExpandedState[mainAccountId] === true;
    }

    function resolveSelectedAccount(group) {
      const mainAccountId = String(group.main_account_id || '');
      const accounts = Array.isArray(group.accounts) ? group.accounts : [];
      if (!accounts.length) {
        return null;
      }

      const selectedAccountId = String(groupSelectedAccountState[mainAccountId] || '');
      return accounts.find((account) => String(account.account_id || '') === selectedAccountId) || accounts[0];
    }

              { label: '未实现盈亏', value: fmt(totals.unrealized_pnl), tone: numberTone(totals.unrealized_pnl) },
              { label: '分发收益', value: fmt(totals.total_distribution), tone: numberTone(totals.total_distribution) },
              { label: '7日年化', value: fmtPercent(totals.distribution_apy_7d), tone: numberTone(totals.distribution_apy_7d) },
            ].map(({ label, value, tone }) => `

                <div class="label">${label}</div>

          </div>
          <div class="section">
            <h4>持仓</h4>
            ${renderRows(
              ['交易对', '方向', '数量', '开仓价', '标记价', '未实现盈亏', '名义价值', '杠杆'],
              account.positions || [],
              (row) => `
                <tr>
                  <td class="mono">${escapeHtml(row.symbol || '-')}</td>
                  <td class="${positionSideTone(row.position_side)}">${escapeHtml(textPositionSide(row.position_side))}</td>
                  <td>${fmt(row.qty)}</td>
                  <td>${fmt(row.entry_price)}</td>
                  <td>${fmt(row.mark_price)}</td>
                  <td class="${numberTone(row.unrealized_pnl)}">${fmt(row.unrealized_pnl)}</td>
                  <td>${fmt(row.notional)}</td>
                  <td>${fmtCount(row.leverage || 0)}x</td>
                </tr>
              `
            )}
          </div>
          <div class="section">
            <h4>资产</h4>
            ${renderRows(
              ['资产', '钱包余额', '可用余额', '保证金余额', '全仓未实现盈亏', '可提数量'],
              account.assets || [],
              (row) => `
                <tr>
                  <td class="mono">${escapeHtml(row.asset || '-')}</td>
                  <td>${fmt(row.wallet_balance)}</td>
                  <td>${fmt(row.available_balance)}</td>
                  <td>${fmt(row.margin_balance)}</td>
                  <td class="${numberTone(row.cross_unrealized_pnl)}">${fmt(row.cross_unrealized_pnl)}</td>
                  <td>${fmt(row.max_withdraw_amount)}</td>
                </tr>
              `
            )}
          </div>
        </article>
      `;
    }

    function renderGroupStatusBadges(summary = {}) {
      const successCount = Number(summary.success_count || 0);
      const errorCount = Number(summary.error_count || 0);
      const badges = [];

      if (successCount > 0) {
        badges.push(`<div class="badge status-ok">${fmtCount(successCount)} 正常</div>`);
      }

      if (errorCount > 0) {
        badges.push(`<div class="badge status-error">${fmtCount(errorCount)} 异常</div>`);
      }

      if (badges.length === 0) {
        badges.push(`<div class="badge">${fmtCount(summary.account_count || 0)} 个账户</div>`);
      }

      return badges.join('');
    }

    function renderGroup(group) {
      const summary = group.summary || {};
      const mainAccountId = String(group.main_account_id || '');
      const accounts = Array.isArray(group.accounts) ? group.accounts : [];
      const expanded = isGroupExpanded(mainAccountId);
      const activeAccount = resolveSelectedAccount(group);
      const activeAccountId = String(activeAccount?.account_id || '');
      const safeMainAccountId = escapeHtml(mainAccountId);
      const safeMainAccountName = escapeHtml(group.main_account_name || group.main_account_id || '-');
      const toggleLabel = expanded ? '收起子账号' : '展开子账号';

      return `
        <section class="group" data-main-account-id="${safeMainAccountId}">
          <div class="group-head">
            <div>
              <h2>${safeMainAccountName}</h2>
              <div class="mono">${safeMainAccountId}</div>
            </div>
            <div class="group-actions">
              <button
                class="group-toggle-button"
                type="button"
                data-main-account-id="${safeMainAccountId}"
                aria-expanded="${expanded ? 'true' : 'false'}"
              >
                ${toggleLabel}
              </button>
              <div class="group-badges">${renderGroupStatusBadges(summary)}</div>
            </div>
          </div>
          <div class="group-summary">
            ${[
              { label: '权益', value: fmt(summary.equity), tone: '' },
              { label: '保证金', value: fmt(summary.margin), tone: '' },
              { label: '可用余额', value: fmt(summary.available_balance), tone: '' },
              { label: '未实现盈亏', value: fmt(summary.unrealized_pnl), tone: numberTone(summary.unrealized_pnl) },
              { label: '分发收益', value: fmt(summary.total_distribution), tone: numberTone(summary.total_distribution) },
              { label: '7日年化', value: fmtPercent(summary.distribution_apy_7d), tone: numberTone(summary.distribution_apy_7d) },
            ].map(({ label, value, tone }) => `
              <div class="metric">
                <div class="label">${label}</div>
                <div class="value ${tone}">${value}</div>
              </div>
            `).join('')}
          </div>
          <div class="account-list${expanded ? '' : ' is-collapsed'}">
            <div class="account-switcher">
              ${accounts.map((account) => {
                const accountId = String(account.account_id || '');
                const label = escapeHtml(account.child_account_name || account.account_name || account.account_id || '-');
                return `
                  <button
                    class="account-switch-button${accountId === activeAccountId ? ' is-active' : ''}"
                    type="button"
                    data-main-account-id="${safeMainAccountId}"
                    data-account-id="${escapeHtml(accountId)}"
                    aria-pressed="${accountId === activeAccountId ? 'true' : 'false'}"
                  >${label}</button>
                `;
              }).join('')}
            </div>
            <div class="account-single-view">
              ${activeAccount ? renderAccount(activeAccount) : '<div class="empty">\u6682\u65e0\u5b50\u8d26\u53f7</div>'}
            </div>
          </div>
        </section>
      `;
    }

    function renderGroups(groups = []) {
      groupsContainer.innerHTML = groups.length
        ? groups.map(renderGroup).join('')
        : '<section class="group"><div class="group-head"><h2>暂无分组</h2></div></section>';
    }

    function replaceGroup(mainAccountId) {
      const group = findGroupByMainId(mainAccountId);
      const groupNode = findGroupNode(mainAccountId);
      if (!group || !groupNode) {
        renderGroups(currentGroups());
        return;
      }

      groupNode.outerHTML = renderGroup(group);
    }

    function render(payload) {
      latestPayload = payload;
      const status = payload.status || 'idle';
      connectionBadge.textContent = textStatus(status);
      connectionBadge.className = `badge ${statusClass(status)}`;
      messageText.textContent = textMessage(payload.message);
      updatedAt.textContent = `更新时间：${fmtTime(payload.updated_at)}`;
      syncMonitorToggle(payload);
      renderToolbarStats(payload.summary || {});
      renderSummary(payload.summary || {});
      renderProfitSummary(payload.profit_summary || {});
      const groups = payload.groups || [];
      normalizeGroupUiState(groups);
      renderGroups(groups);
    }

    function describeRefreshResult(refreshResult, elapsedSeconds) {
      const failures = Array.isArray(refreshResult.failed_accounts) ? refreshResult.failed_accounts : [];
      const fallbackSections = Array.isArray(refreshResult.fallback_sections) ? refreshResult.fallback_sections : [];

      if (refreshResult.success) {
        if (fallbackSections.length > 0) {
          return `刷新成功，耗时 ${elapsedSeconds} 秒，部分数据沿用了上次成功结果`;
        }
        return `刷新成功，耗时 ${elapsedSeconds} 秒，数据已更新`;
      }

      if (refreshResult.timeout) {
        return refreshResult.message || '刷新超时，已保留当前数据';
      }

      if (failures.length > 0) {
        return refreshResult.message || '刷新失败，已保留当前数据';
      }

      return refreshResult.message || '刷新失败，已保留当前数据';
    }

    async function setMonitorEnabled(enabled) {
      toggleBusy = true;
      monitorToggle.disabled = true;
      applyActionButtonState();
      try {
        const response = await fetch('/api/monitor/control', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled }),
        });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const payload = await response.json();
        render(payload);
      } catch (error) {
        monitorToggle.checked = !enabled;
        messageText.textContent = `监控状态更新失败：${error}`;
      } finally {
        toggleBusy = false;
        monitorToggle.disabled = refreshBusy || importBusy;
        applyActionButtonState();
      }
    }

    async function refreshNow() {
      if (refreshBusy) {
        messageText.textContent = '上一轮刷新仍在进行中，当前数据保持不变';
        return;
      }

      refreshBusy = true;
      const refreshStartedAt = Date.now();
      monitorToggle.disabled = true;
      applyActionButtonState();
      messageText.textContent = '正在刷新，当前数据保持不变，等待新数据返回后自动更新';
      try {
        const response = await fetch('/api/monitor/refresh', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const payload = await response.json();
        render(payload);
        const refreshResult = payload.refresh_result || { success: true, message: payload.message };
        const elapsedSeconds = Math.max(1, Math.round((Date.now() - refreshStartedAt) / 1000));
        messageText.textContent = describeRefreshResult(refreshResult, elapsedSeconds);
        if (refreshResult.success) {
          messageText.textContent = `刷新成功，耗时 ${elapsedSeconds} 秒，数据已更新`;
        } else {
          messageText.textContent = `刷新失败，已保留当前数据：${refreshResult.message}`;
        }
        return;
      } catch (error) {
        messageText.textContent = `立即刷新失败：${error}`;
      } finally {
        refreshBusy = false;
        monitorToggle.disabled = toggleBusy || importBusy;
        applyActionButtonState();
      }
    }

    function describeImportResult(payload = {}) {
      const result = payload.import_result || {};
      const groupCount = fmtCount(result.main_account_count || 0);
      const accountCount = fmtCount(result.account_count || 0);
      if (payload.refresh_result?.success === false) {
        return `Excel 导入成功，已覆盖 ${groupCount} 个分组 / ${accountCount} 个账户，但刷新失败：${payload.refresh_result.message || '-'}`;
      }
      return `Excel 导入成功，已覆盖 ${groupCount} 个分组 / ${accountCount} 个账户`;
    }

    function parseDownloadFilename(contentDisposition) {
      if (!contentDisposition) {
        return 'monitor_accounts_template.xlsx';
      }
      const match = contentDisposition.match(/filename=\"?([^\";]+)\"?/i);
      return match ? match[1] : 'monitor_accounts_template.xlsx';
    }

    async function downloadTemplate() {
      if (importBusy || refreshBusy || toggleBusy) {
        return;
      }

      messageText.textContent = '正在下载 Excel 模板';
      try {
        const response = await fetch('/api/config/import/excel-template', {
          method: 'GET',
          cache: 'no-store',
        });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const blob = await response.blob();
        const filename = parseDownloadFilename(response.headers.get('content-disposition'));
        const url = window.URL.createObjectURL(blob);
        const anchor = document.createElement('a');
        anchor.href = url;
        anchor.download = filename;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        window.URL.revokeObjectURL(url);
        messageText.textContent = 'Excel 模板已开始下载';
      } catch (error) {
        messageText.textContent = `模板下载失败：${error}`;
      }
    }

    async function uploadExcel(file) {
      if (!file || importBusy) {
        return;
      }

      importBusy = true;
      monitorToggle.disabled = true;
      applyActionButtonState();
      messageText.textContent = '正在导入 Excel 配置，现有数据保持不变';
      try {
        const formData = new FormData();
        formData.append('file', file);
        const response = await fetch('/api/config/import/excel', {
          method: 'POST',
          body: formData,
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.detail || payload.message || `HTTP ${response.status}`);
        }
        render(payload);
        messageText.textContent = describeImportResult(payload);
      } catch (error) {
        messageText.textContent = `Excel 导入失败：${error}`;
      } finally {
        importBusy = false;
        importInput.value = '';
        monitorToggle.disabled = toggleBusy || refreshBusy;
        applyActionButtonState();
      }
    }

    async function bootstrap() {
      try {
        const response = await fetch(groupsUrl, { cache: 'no-store' });
        if (response.ok) {
          render(await response.json());
        } else {
          messageText.textContent = `初始化失败：HTTP ${response.status}`;
        }
      } catch (error) {
        messageText.textContent = `初始化失败：${error}`;
      }

      monitorToggle.addEventListener('change', () => {
        if (toggleBusy) {
          return;
        }
        setMonitorEnabled(monitorToggle.checked);
      });

      refreshButton.addEventListener('click', () => {
        if (refreshBusy) {
          messageText.textContent = '上一轮刷新仍在进行中，当前数据保持不变';
          return;
        }
        if (refreshCooldownSeconds > 0) {
          return;
        }
        startRefreshCooldown(30);
        refreshNow();
      });

      downloadTemplateButton.addEventListener('click', () => {
        downloadTemplate();
      });

      importButton.addEventListener('click', () => {
        if (importBusy || refreshBusy) {
          return;
        }
        importInput.click();
      });

      importInput.addEventListener('change', () => {
        const [file] = importInput.files || [];
        if (!file) {
          return;
        }
        uploadExcel(file);
      });

      fundingTransferButton.addEventListener('click', () => {
        if (fundingTransferButton.disabled) {
          return;
        }
        openFundingModal();
      });

      fundingModalClose.addEventListener('click', () => {
        closeFundingModal();
      });

      fundingCancelButton.addEventListener('click', () => {
        closeFundingModal();
      });

      fundingModalShell.addEventListener('click', (event) => {
        if (event.target instanceof HTMLElement && event.target.dataset.closeFundingModal === 'true') {
          closeFundingModal();
        }
      });

      fundingGroupSelect.addEventListener('change', () => {
        fundingSelectedGroupId = fundingGroupSelect.value;
        fundingSelectedAsset = '';
        loadFundingOverview(fundingSelectedGroupId, { resetState: true });
      });

      fundingModeDistribute.addEventListener('click', () => {
        fundingDirection = 'distribute';
        renderFundingModal();
      });

      fundingModeCollect.addEventListener('click', () => {
        fundingDirection = 'collect';
        renderFundingModal();
      });

      fundingAssetSelect.addEventListener('change', () => {
        fundingSelectedAsset = fundingAssetSelect.value;
        renderFundingModal();
      });

      fundingRows.addEventListener('input', (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) {
          return;
        }
        if (target.matches('[data-funding-amount-id]')) {
          const input = target;
          const accountId = String(input.getAttribute('data-funding-amount-id') || '');
          fundingRowState(accountId).amount = input.value;
        }
      });

      fundingRows.addEventListener('change', (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) {
          return;
        }
        if (target.matches('[data-funding-account-id]')) {
          const checkbox = target;
          const accountId = String(checkbox.getAttribute('data-funding-account-id') || '');
          fundingRowState(accountId).checked = checkbox.checked;
          renderFundingRows();
        }
      });

      fundingSubmitButton.addEventListener('click', () => {
        submitFundingOperation();
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && !fundingModalShell.classList.contains('hidden')) {
          closeFundingModal();
        }
      });

      groupsContainer.addEventListener('click', (event) => {
        const toggleButton = event.target.closest('.group-toggle-button');
        if (toggleButton) {
          const mainAccountId = String(toggleButton.dataset.mainAccountId || '');
          if (!mainAccountId) {
            return;
          }
          groupExpandedState[mainAccountId] = !isGroupExpanded(mainAccountId);
          replaceGroup(mainAccountId);
          return;
        }

        const switchButton = event.target.closest('.account-switch-button');
        if (!switchButton) {
          return;
        }

        const mainAccountId = String(switchButton.dataset.mainAccountId || '');
        const accountId = String(switchButton.dataset.accountId || '');
        if (!mainAccountId || !accountId) {
          return;
        }

        groupExpandedState[mainAccountId] = true;
        groupSelectedAccountState[mainAccountId] = accountId;
        replaceGroup(mainAccountId);
      });

      const source = new EventSource(streamUrl);
      source.addEventListener('monitor_snapshot', (event) => {
        render(JSON.parse(event.data));
      });
      source.onerror = () => {
        connectionBadge.textContent = textStatus('reconnecting');
        connectionBadge.className = `badge ${statusClass('reconnecting')}`;
      };
    }

    applyActionButtonState();
    bootstrap();
  </script>
</body>
</html>
