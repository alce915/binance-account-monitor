<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>币安账户监控台</title>
  <style>
    :root {
      --panel: rgba(255, 255, 255, 0.9);
      --panel-soft: rgba(255, 255, 255, 0.74);
      --line: rgba(46, 32, 14, 0.12);
      --text: #241b12;
      --muted: #7c6d5d;
      --accent: #b66c2f;
      --good: #1f7a48;
      --warn: #b07a00;
      --bad: #b54636;
      --off: #667085;
      --shadow: 0 18px 45px rgba(48, 31, 12, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 210, 140, 0.5), transparent 28%),
        linear-gradient(180deg, #fbf7f1 0%, #f1e8dc 100%);
    }

    .shell {
      width: min(1240px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 18px 0 32px;
    }

    .hero, .toolbar, .card, .group, .account {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero {
      padding: 20px 28px;
      display: grid;
      gap: 8px;
    }

    .hero-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hero-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      flex-wrap: wrap;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(26px, 3.6vw, 40px);
      line-height: 1.08;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: clamp(15px, 1.4vw, 17px);
    }

    .hero-actions {
      display: inline-flex;
      align-items: flex-start;
      justify-content: flex-end;
      gap: 10px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .hero-controls {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .toolbar {
      margin-top: 12px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toolbar-main {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .toolbar-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .toolbar-stats {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .stat-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--panel-soft);
      border: 1px solid rgba(46, 32, 14, 0.08);
      font-size: 13px;
      line-height: 1;
      white-space: nowrap;
    }

    .stat-pill-label { color: var(--muted); }
    .stat-pill-value { font-weight: 700; font-variant-numeric: tabular-nums; }

    .badge {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(182, 108, 47, 0.12);
      color: var(--accent);
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
    }

    .badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      flex: 0 0 auto;
    }

    .status-ok { color: var(--good); background: rgba(31, 122, 72, 0.12); }
    .status-partial { color: var(--warn); background: rgba(176, 122, 0, 0.12); }
    .status-error { color: var(--bad); background: rgba(181, 70, 54, 0.12); }
    .status-disabled { color: var(--off); background: rgba(102, 112, 133, 0.12); }

    .switch {
      display: inline-flex;
      align-items: center;
      gap: 0;
      padding: 6px;
      border: 1px solid rgba(46, 32, 14, 0.08);
      border-radius: 999px;
      background: var(--panel-soft);
      white-space: nowrap;
    }

    .switch input { position: absolute; opacity: 0; pointer-events: none; }

    .switch-track {
      width: 46px;
      height: 26px;
      border-radius: 999px;
      background: rgba(124, 109, 93, 0.28);
      position: relative;
      transition: background 0.2s ease;
      flex: 0 0 auto;
    }

    .switch-track::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 10px rgba(36, 27, 18, 0.18);
      transition: transform 0.2s ease;
    }

    .switch input:checked + .switch-track { background: rgba(31, 122, 72, 0.48); }
    .switch input:checked + .switch-track::after { transform: translateX(20px); }
    .switch input:disabled + .switch-track { opacity: 0.55; }

    .refresh-button, .group-toggle-button {
      border: 1px solid rgba(46, 32, 14, 0.08);
      border-radius: 999px;
      background: var(--panel-soft);
      color: var(--text);
      padding: 8px 14px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, opacity 0.2s ease;
      min-width: 88px;
      text-align: center;
      white-space: nowrap;
    }

    .refresh-button:hover:not(:disabled), .group-toggle-button:hover:not(:disabled) { background: rgba(255, 255, 255, 0.94); }
    .refresh-button:disabled, .group-toggle-button:disabled { opacity: 0.6; cursor: default; }

    #downloadTemplateButton { order: 1; }
    #importButton { order: 2; }
    #fundingTransferButton { order: 3; }

    .summary, .profit-summary {
      margin-top: 18px;
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .card { padding: 18px; }
    .label { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
    .value {
      font-size: clamp(18px, 2.6vw, 26px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      overflow-wrap: anywhere;
      word-break: break-word;
      font-variant-numeric: tabular-nums;
    }

    .value-positive { color: var(--good); }
    .value-negative { color: var(--bad); }
    .side-long { color: var(--good); }
    .side-short { color: var(--bad); }

    .groups {
      margin-top: 20px;
      display: grid;
      gap: 18px;
    }

    .group { overflow: hidden; }

    .group-head {
      padding: 18px 22px;
      background: rgba(255, 248, 239, 0.84);
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .group-head h2 { margin: 0; }

    .group-actions, .group-badges {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .group-summary {
      padding: 18px 22px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .account-list {
      padding: 0 22px 22px;
      display: grid;
      gap: 14px;
    }

    .account-list.is-collapsed { display: none; }

    .account-switcher {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .account-switch-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(46, 32, 14, 0.1);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(240, 232, 223, 0.94));
      color: var(--text);
      padding: 16px 22px;
      font: inherit;
      font-size: clamp(16px, 1.6vw, 22px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      min-width: 148px;
      text-align: center;
      text-decoration: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7), 0 10px 20px rgba(48, 31, 12, 0.06);
    }

    .account-switch-button:hover {
      border-color: rgba(182, 108, 47, 0.2);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(247, 238, 228, 0.96));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72), 0 14px 26px rgba(48, 31, 12, 0.1);
    }

    .account-switch-button:focus-visible {
      outline: none;
      border-color: rgba(182, 108, 47, 0.45);
      box-shadow: 0 0 0 3px rgba(182, 108, 47, 0.16), inset 0 1px 0 rgba(255, 255, 255, 0.72), 0 14px 26px rgba(48, 31, 12, 0.1);
    }

    .account-switch-button.is-active {
      border-color: rgba(46, 126, 63, 0.28);
      background: linear-gradient(180deg, #75d24d 0%, #57b933 100%);
      color: #10200e;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.28), 0 14px 28px rgba(67, 139, 43, 0.22);
    }

    .account-single-view { display: block; }
    .account { overflow: hidden; }

    .account-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .account-head h3 { margin: 0; }

    .account-grid {
      padding: 16px 18px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
    }

    .metric, .funding-stat {
      border: 1px solid rgba(46, 32, 14, 0.08);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.7);
      min-width: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      table-layout: fixed;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(46, 32, 14, 0.06);
      text-align: left;
      overflow-wrap: anywhere;
      word-break: break-word;
      font-variant-numeric: tabular-nums;
    }

    th { color: var(--muted); }

    .section { padding: 0 18px 18px; }
    .section h4 { margin: 0 0 12px; color: var(--muted); font-size: 13px; }
    .empty { color: var(--muted); padding: 10px 0; }

    .modal-shell {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 50;
    }

    .modal-shell.hidden { display: none; }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(36, 27, 18, 0.36);
      backdrop-filter: blur(6px);
    }

    .modal-panel {
      position: relative;
      width: min(1080px, calc(100vw - 32px));
      max-height: min(840px, calc(100vh - 32px));
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(255, 250, 244, 0.96);
      box-shadow: 0 24px 60px rgba(36, 27, 18, 0.22);
    }

    .modal-head, .modal-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 24px;
      border-bottom: 1px solid rgba(46, 32, 14, 0.08);
    }

    .modal-foot {
      border-bottom: 0;
      border-top: 1px solid rgba(46, 32, 14, 0.08);
      flex-wrap: wrap;
    }

    .modal-head h2 { margin: 0; font-size: 24px; }
    .modal-subtitle { margin: 4px 0 0; color: var(--muted); font-size: 13px; line-height: 1.4; }

    .modal-close {
      border: 1px solid rgba(46, 32, 14, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
      color: var(--text);
      width: 40px;
      height: 40px;
      font: inherit;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
    }

    .modal-body {
      overflow: auto;
      padding: 20px 24px 24px;
      display: grid;
      gap: 16px;
    }

    .modal-controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      align-items: end;
    }

    .field { display: grid; gap: 8px; }
    .field span { color: var(--muted); font-size: 12px; font-weight: 700; }

    .field select, .funding-amount-input {
      width: 100%;
      border: 1px solid rgba(46, 32, 14, 0.12);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }

    .segmented {
      display: inline-flex;
      width: 100%;
      padding: 4px;
      border-radius: 999px;
      background: rgba(46, 32, 14, 0.06);
      border: 1px solid rgba(46, 32, 14, 0.08);
      gap: 4px;
    }

    .segment-button {
      flex: 1 1 0;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      padding: 10px 14px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .segment-button.is-active {
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
      box-shadow: 0 10px 24px rgba(36, 27, 18, 0.08);
    }

    .modal-status, .modal-feedback {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .modal-status.is-error, .modal-feedback.is-error { color: var(--bad); }
    .modal-status.is-success, .modal-feedback.is-success { color: var(--good); }

    .funding-main-card {
      padding: 16px 18px;
      border: 1px solid rgba(46, 32, 14, 0.08);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.74);
      display: grid;
      gap: 10px;
    }

    .funding-main-card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .funding-main-card h3 { margin: 0; font-size: 18px; }

    .funding-main-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }

    .funding-list-wrap {
      border: 1px solid rgba(46, 32, 14, 0.08);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.78);
      overflow: hidden;
    }

    .funding-table { table-layout: auto; }
    .funding-table th, .funding-table td { vertical-align: middle; white-space: nowrap; }
    .funding-table td:last-child { white-space: normal; }
    .funding-table tbody tr.is-disabled { opacity: 0.58; }
    .funding-amount-input:disabled, .funding-table input[type="checkbox"]:disabled { cursor: not-allowed; opacity: 0.65; }

    .modal-actions {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      margin-left: auto;
    }

    .card-note { margin-top: 8px; color: var(--muted); font-size: 12px; line-height: 1.4; }
    .mono { font-family: Consolas, monospace; overflow-wrap: anywhere; word-break: break-word; font-variant-numeric: tabular-nums; }

    @media (max-width: 768px) {
      .shell { width: min(100vw - 20px, 1240px); }
      .hero { padding: 18px 18px; }
      .hero-actions { justify-content: flex-start; margin-left: 0; }
      .toolbar { padding: 12px 16px; }
      .account-switch-button { min-width: 0; flex: 1 1 calc(50% - 6px); padding: 14px 16px; font-size: 18px; }
      .modal-shell { padding: 12px; }
      .modal-panel { width: min(100vw - 12px, 1080px); max-height: min(100vh - 12px, 920px); }
      .modal-head, .modal-body, .modal-foot { padding-left: 16px; padding-right: 16px; }
      .funding-table th, .funding-table td { white-space: normal; }
      table { display: block; overflow-x: auto; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="hero-head">
        <div class="hero-title-row">
          <div>
            <h1>币安账户监控台</h1>
            <p>步步为营，稳中求胜</p>
          </div>
          <div class="hero-actions">
            <div class="badge" id="connectionBadge">连接中</div>
            <div class="hero-controls">
              <label class="switch" for="monitorToggle">
                <input type="checkbox" id="monitorToggle" checked>
                <span class="switch-track" aria-hidden="true"></span>
              </label>
              <button class="refresh-button" id="downloadTemplateButton" type="button">下载模板</button>
              <button class="refresh-button" id="importButton" type="button">导入 Excel</button>
              <button class="refresh-button" id="fundingTransferButton" type="button">资金归集</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="toolbar">
      <div class="toolbar-main">
        <div id="messageText">正在等待监控数据</div>
        <div class="toolbar-stats" id="toolbarStats"></div>
      </div>
      <div class="toolbar-meta">
        <div class="mono" id="updatedAt">-</div>
        <button class="refresh-button" id="refreshButton" type="button">立即刷新</button>
        <input id="importInput" type="file" accept=".xlsx" hidden>
      </div>
    </section>

    <section class="summary" id="summaryCards"></section>
    <section class="profit-summary" id="profitCards"></section>
    <section class="groups" id="groupsContainer"></section>
  </main>

  <div class="modal-shell hidden" id="fundingModalShell">
    <div class="modal-backdrop" data-close-funding-modal="true"></div>
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="fundingModalTitle">
      <div class="modal-head">
        <div>
          <h2 id="fundingModalTitle">资金归集与分发</h2>
          <p class="modal-subtitle" id="fundingModalSubtitle">在主账号与子账号之间执行 Funding 资金划转</p>
        </div>
        <button class="modal-close" id="fundingModalClose" type="button" aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="modal-controls">
          <label class="field">
            <span>分组</span>
            <select id="fundingGroupSelect"></select>
          </label>
          <div class="field">
            <span>方向</span>
            <div class="segmented">
              <button class="segment-button is-active" id="fundingModeDistribute" type="button">主账号分发</button>
              <button class="segment-button" id="fundingModeCollect" type="button">子账号归集</button>
            </div>
          </div>
          <label class="field">
            <span>代币</span>
            <select id="fundingAssetSelect"></select>
          </label>
        </div>
        <div class="modal-status" id="fundingCapabilityMessage"></div>
        <div class="funding-main-card" id="fundingMainSummary"></div>
        <div class="funding-list-wrap">
          <table class="funding-table">
            <thead>
              <tr>
                <th>选择</th>
                <th>子账号</th>
                <th>UID</th>
                <th>Funding 可用</th>
                <th>分发金额</th>
                <th>可用状态</th>
              </tr>
            </thead>
            <tbody id="fundingRows"></tbody>
          </table>
        </div>
      </div>
      <div class="modal-foot">
        <div class="modal-feedback" id="fundingFeedback"></div>
        <div class="modal-actions">
          <button class="refresh-button" id="fundingCancelButton" type="button">取消</button>
          <button class="refresh-button" id="fundingSubmitButton" type="button">提交</button>
        </div>
      </div>
    </section>
  </div>

  <script src="/static/monitor_v2.js?v=20260328-1"></script>
</body>
</html>
