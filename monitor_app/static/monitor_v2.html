<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title data-i18n-title="app.title"></title>
  <link rel="stylesheet" href="/static/monitor_v2.css?v=20260424-01">
</head>
<body class="monitor-screen" data-theme="black-gold">
  <main class="shell shell-monitor">
    <section class="hero hero-seamless">
      <div class="hero-head">
        <div class="hero-title-row">
          <div>
            <h1 data-i18n="app.title"></h1>
            <p data-i18n="app.motto"></p>
          </div>
          <div class="hero-actions">
            <div class="badge badge-status-reference status-pill-reference status-pill-scaled status-pill-scale-130" id="connectionBadge" data-monitor-status="idle" data-i18n="status.connecting"></div>
            <div class="hero-controls">
              <label class="switch switch-luxury switch-reference switch-scaled" for="monitorToggle">
                <input type="checkbox" id="monitorToggle" checked>
                <span class="switch-track" aria-hidden="true"></span>
              </label>
              <button class="refresh-button hero-action-button-stretched" id="downloadTemplateButton" type="button" data-i18n="actions.downloadTemplate"></button>
              <button class="refresh-button hero-action-button-stretched" id="importButton" type="button" data-i18n="actions.importExcel"></button>
              <button class="refresh-button hero-action-button-stretched" id="fundingTransferButton" type="button" data-i18n="actions.fundingTransfer"></button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="toolbar">
      <div class="toolbar-main">
        <div id="messageText" data-i18n="toolbar.waitingData"></div>
        <div class="toolbar-stats" id="toolbarStats"></div>
      </div>
      <div class="toolbar-meta">
        <div class="toolbar-auth">
          <div class="badge" id="authRoleBadge" data-i18n="roles.admin"></div>
          <button class="refresh-button" id="logoutButton" type="button" data-i18n="actions.logout"></button>
        </div>
        <div class="mono" id="updatedAt">-</div>
        <button class="refresh-button hero-action-button-stretched" id="refreshButton" type="button" data-i18n="actions.refreshNow"></button>
        <input id="importInput" type="file" accept=".xlsx" hidden>
      </div>
    </section>

    <section class="summary" id="summaryCards"></section>
    <section class="profit-summary profit-strip linked-strip" id="profitCards"></section>
    <section class="groups" id="groupsContainer"></section>
  </main>

  <div class="modal-shell hidden" id="fundingModalShell">
    <div class="modal-backdrop" data-close-funding-modal="true"></div>
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="fundingModalTitle">
      <div class="modal-head">
        <div class="modal-head-content">
          <div class="modal-head-title-row">
            <h2 id="fundingModalTitle" data-i18n="funding.title"></h2>
            <button class="refresh-button" id="fundingRefreshButton" type="button" data-i18n="actions.refreshNow"></button>
          </div>
          <button class="modal-close" id="fundingModalClose" type="button" data-i18n-aria-label="actions.close">×</button>
        </div>
      </div>
      <div class="modal-body">
        <div class="modal-controls">
          <div class="field">
            <span data-i18n="funding.direction"></span>
            <div class="segmented">
              <button class="segment-button is-active" id="fundingModeDistribute" type="button" data-i18n="funding.modeDistribute"></button>
              <button class="segment-button" id="fundingModeCollect" type="button" data-i18n="funding.modeCollect"></button>
            </div>
          </div>
          <label class="field">
            <span data-i18n="funding.group"></span>
            <select id="fundingGroupSelect"></select>
          </label>
          <label class="field">
            <span data-i18n="funding.token"></span>
            <select id="fundingAssetSelect"></select>
          </label>
        </div>
        <div class="funding-main-card" id="fundingMainSummary"></div>
        <div class="funding-list-wrap">
          <div class="funding-list-body">
            <table class="funding-table">
              <colgroup>
                <col class="funding-col-select">
                <col class="funding-col-account">
                <col class="funding-col-uid">
                <col class="funding-col-available">
                <col class="funding-col-amount">
                <col class="funding-col-status">
              </colgroup>
              <thead>
                <tr>
                  <th>
                    <label class="funding-select-all">
                      <span data-i18n="funding.table.select"></span>
                      <input id="fundingSelectAllCheckbox" type="checkbox" data-i18n-aria-label="funding.table.selectAllAria">
                    </label>
                  </th>
                  <th data-i18n="funding.table.subAccount"></th>
                  <th data-i18n="funding.table.uid"></th>
                  <th data-i18n="funding.table.spotAvailable"></th>
                  <th>
                    <label class="funding-sync-toggle">
                      <span data-i18n="funding.table.amount"></span>
                      <input id="fundingSyncAmountCheckbox" type="checkbox" data-i18n-aria-label="funding.table.syncAmountAria">
                      <span data-i18n="funding.table.syncAmount"></span>
                    </label>
                  </th>
                  <th data-i18n="funding.table.availableStatus"></th>
                </tr>
              </thead>
              <tbody id="fundingRows"></tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <div class="modal-actions">
          <div class="modal-actions-side" id="fundingQuickActions" hidden>
            <button class="refresh-button" id="fundingQuickCollectButton" type="button" data-i18n="actions.quickCollect"></button>
            <button class="refresh-button" id="fundingQuickClearButton" type="button" data-i18n="actions.quickClear"></button>
          </div>
          <div class="modal-actions-center">
            <div class="modal-actions-meta-row">
              <div class="modal-actions-meta mono" id="fundingOperationMeta"></div>
              <button class="refresh-button modal-actions-copy" id="fundingOperationCopyButton" type="button" data-i18n="actions.copyId"></button>
            </div>
            <button class="refresh-button modal-actions-submit" id="fundingSubmitButton" type="button" data-i18n="actions.submit"></button>
          </div>
        </div>
        <div class="funding-log-panel">
          <div class="funding-log-head">
            <div class="funding-log-tabs">
              <button class="funding-log-tab is-active" id="fundingLogTabRuntime" type="button" data-i18n="funding.logs.runtime"></button>
              <button class="funding-log-tab" id="fundingLogTabAudit" type="button" data-i18n="funding.logs.audit"></button>
            </div>
            <div class="funding-log-latest mono" id="fundingLogLatestTime">--:--:--</div>
          </div>
          <div class="funding-log-list" id="fundingLogList"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="/static/monitor_v2.i18n.js?v=20260424-01"></script>
  <script src="/static/monitor_v2.js?v=20260424-02"></script>
</body>
</html>
