<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>__LOGIN_TITLE__</title>
  <link rel="stylesheet" href="/static/login.css?v=20260423-06">
</head>
<body class="login-screen" data-theme="black-gold">
  <main class="card login-card">
    <h1>__LOGIN_TITLE__</h1>
    <p id="descriptionText">__LOGIN_DESCRIPTION__</p>
    <form id="loginForm">
      <label>
        __LOGIN_PASSWORD_LABEL__
        <input id="passwordInput" type="password" autocomplete="current-password" placeholder="__LOGIN_PASSWORD_PLACEHOLDER__">
      </label>
      <button id="submitButton" type="submit">__LOGIN_SUBMIT_BUTTON__</button>
    </form>
    <div id="messageText" class="message"></div>
  </main>
  <script>
    const loginI18n = __LOGIN_I18N__;
    const form = document.getElementById('loginForm');
    const passwordInput = document.getElementById('passwordInput');
    const submitButton = document.getElementById('submitButton');
    const messageText = document.getElementById('messageText');
    const descriptionText = document.getElementById('descriptionText');
    const query = new URLSearchParams(window.location.search);

    function redirectTo(path) {
      if (window.__LOGIN_TEST_MODE__ && typeof window.__loginReplaceSpy__ === 'function') {
        window.__loginReplaceSpy__(path);
        return;
      }
      window.location.replace(path);
    }

    function sanitizeNextPath(value) {
      if (!value || typeof value !== 'string') {
        return '/';
      }
      try {
        const parsed = new URL(value, window.location.origin);
        if (parsed.origin !== window.location.origin) {
          return '/';
        }
        const normalized = `${parsed.pathname}${parsed.search}${parsed.hash}`;
        return normalized.startsWith('/') ? normalized : '/';
      } catch (error) {
        return '/';
      }
    }

    const nextPath = sanitizeNextPath(query.get('next'));

    function setMessage(text, type = '') {
      messageText.textContent = text || '';
      messageText.className = `message${type ? ` ${type}` : ''}`;
    }

    async function loadSession() {
      const response = await fetch('/api/auth/session', { cache: 'no-store' });
      const payload = await response.json();
      if (response.status === 503 && payload?.error?.code === 'AUTH_NOT_INITIALIZED') {
        descriptionText.textContent = loginI18n.not_initialized_description;
        setMessage(loginI18n.not_initialized_error, 'error');
        return;
      }
      if (payload?.authenticated) {
        redirectTo(nextPath);
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const password = passwordInput.value.trim();
      if (!password) {
        setMessage(loginI18n.password_required_error, 'error');
        passwordInput.focus();
        return;
      }

      submitButton.disabled = true;
      setMessage('');
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const payload = await response.json();
        if (!response.ok) {
          setMessage(payload?.error?.message || loginI18n.auth_failed_error, 'error');
          passwordInput.value = '';
          passwordInput.focus();
          return;
        }
        redirectTo(nextPath);
      } catch (error) {
        setMessage(loginI18n.request_failed_error, 'error');
      } finally {
        submitButton.disabled = false;
      }
    });

    loadSession().catch(() => {
      setMessage(loginI18n.session_failed_error, 'error');
    });

    if (window.__LOGIN_TEST_MODE__) {
      window.__loginPage = {
        sanitizeNextPath,
        loadSession,
        redirectTo,
      };
    }
  </script>
</body>
</html>
