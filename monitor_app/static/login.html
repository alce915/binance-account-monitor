<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>__LOGIN_TITLE__</title>
  <style>
    :root {
      --bg: #f7f2ea;
      --panel: rgba(255, 255, 255, 0.94);
      --line: rgba(54, 34, 15, 0.12);
      --text: #241b12;
      --muted: #7c6d5d;
      --accent: #2e6ad7;
      --bad: #b54636;
      --shadow: 0 12px 30px rgba(48, 31, 12, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(255, 214, 153, 0.45), transparent 30%),
        linear-gradient(180deg, #fbf7f1 0%, #efe4d6 100%);
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--text);
    }

    .card {
      width: min(460px, calc(100vw - 32px));
      padding: 28px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    form {
      margin-top: 22px;
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(54, 34, 15, 0.14);
      border-radius: 16px;
      font: inherit;
      color: var(--text);
      background: rgba(255, 255, 255, 0.96);
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 18px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
    }

    button:disabled { opacity: 0.65; cursor: default; }

    .message {
      min-height: 22px;
      font-size: 14px;
      line-height: 1.5;
      margin-top: 14px;
      color: var(--muted);
    }

    .message.error { color: var(--bad); }
  </style>
</head>
<body>
  <main class="card">
    <h1>__LOGIN_TITLE__</h1>
    <p id="descriptionText">__LOGIN_DESCRIPTION__</p>
    <form id="loginForm">
      <label>
        __LOGIN_PASSWORD_LABEL__
        <input id="passwordInput" type="password" autocomplete="current-password" placeholder="__LOGIN_PASSWORD_PLACEHOLDER__">
      </label>
      <button id="submitButton" type="submit">__LOGIN_SUBMIT_BUTTON__</button>
    </form>
    <div id="messageText" class="message"></div>
  </main>
  <script>
    const loginI18n = __LOGIN_I18N__;
    const form = document.getElementById('loginForm');
    const passwordInput = document.getElementById('passwordInput');
    const submitButton = document.getElementById('submitButton');
    const messageText = document.getElementById('messageText');
    const descriptionText = document.getElementById('descriptionText');
    const query = new URLSearchParams(window.location.search);

    function redirectTo(path) {
      if (window.__LOGIN_TEST_MODE__ && typeof window.__loginReplaceSpy__ === 'function') {
        window.__loginReplaceSpy__(path);
        return;
      }
      window.location.replace(path);
    }

    function sanitizeNextPath(value) {
      if (!value || typeof value !== 'string') {
        return '/';
      }
      try {
        const parsed = new URL(value, window.location.origin);
        if (parsed.origin !== window.location.origin) {
          return '/';
        }
        const normalized = `${parsed.pathname}${parsed.search}${parsed.hash}`;
        return normalized.startsWith('/') ? normalized : '/';
      } catch (error) {
        return '/';
      }
    }

    const nextPath = sanitizeNextPath(query.get('next'));

    function setMessage(text, type = '') {
      messageText.textContent = text || '';
      messageText.className = `message${type ? ` ${type}` : ''}`;
    }

    async function loadSession() {
      const response = await fetch('/api/auth/session', { cache: 'no-store' });
      const payload = await response.json();
      if (response.status === 503 && payload?.error?.code === 'AUTH_NOT_INITIALIZED') {
        descriptionText.textContent = loginI18n.not_initialized_description;
        setMessage(loginI18n.not_initialized_error, 'error');
        return;
      }
      if (payload?.authenticated) {
        redirectTo(nextPath);
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const password = passwordInput.value.trim();
      if (!password) {
        setMessage(loginI18n.password_required_error, 'error');
        passwordInput.focus();
        return;
      }

      submitButton.disabled = true;
      setMessage('');
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const payload = await response.json();
        if (!response.ok) {
          setMessage(payload?.error?.message || loginI18n.auth_failed_error, 'error');
          passwordInput.value = '';
          passwordInput.focus();
          return;
        }
        redirectTo(nextPath);
      } catch (error) {
        setMessage(loginI18n.request_failed_error, 'error');
      } finally {
        submitButton.disabled = false;
      }
    });

    loadSession().catch(() => {
      setMessage(loginI18n.session_failed_error, 'error');
    });

    if (window.__LOGIN_TEST_MODE__) {
      window.__loginPage = {
        sanitizeNextPath,
        loadSession,
        redirectTo,
      };
    }
  </script>
</body>
</html>
